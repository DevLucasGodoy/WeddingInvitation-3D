<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="public/assets/favicon.ico" />
    <link rel="shortcut icon" type="image/x-icon" href="public/assets/favicon.ico" />
    <link rel="apple-touch-icon" href="public/assets/apple-touch-icon.png" />

    <!-- SEO primário -->
    <title>Convite de Casamento - Lucas &amp; Eduarda</title>
    <meta
      name="description"
      content="Convite digital do casamento de Lucas & Eduarda. Toque para abrir o convite e confirme sua presença."
    />
    <meta name="author" content="Lucas & Eduarda" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />

    <meta property="og:title" content="Convite de Casamento - Lucas & Eduarda" />
    <meta

      content="Toque para abrir o convite digital do casamento de Lucas & Eduarda e confirme sua presença."
    />
    <meta property="og:url" content="https://convite-lucaseeduarda.vercel.app/" />
    <meta
      property="og:image"
      content="https://convite-lucaseeduarda.vercel.app/public/assets/og-image.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:alt" content="Convite de Casamento de Lucas & Eduarda" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Convite de Casamento - Lucas & Eduarda" />
    <meta
      name="twitter:description"
      content="Toque para abrir o convite digital do casamento de Lucas & Eduarda e confirme sua presença."
    />
    <meta
      name="twitter:image"
      content="https://convite-lucaseeduarda.vercel.app/public/assets/og-image.jpg"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        /* Espaço reservado embaixo para a instrução/botão fixos.
           Duas linhas: vh como fallback, dvh (viewport dinâmica) quando houver
           suporte — evita que a barra do navegador mobile corte o conteúdo. */
        --reserved-bottom: clamp(84px, 16vh, 140px);
        --reserved-bottom: clamp(84px, 16dvh, 140px);
        background-color: #e5ffe6;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        min-height: 100dvh;
        font-family: Arial, sans-serif;
        cursor: pointer;
        overflow: hidden;
        /* Espaçamento simétrico → cartão centralizado na viewport. A instrução
           e o botão (position: fixed) flutuam sobre a margem inferior; o cartão
           é dimensionado com folga (--reserved-bottom no cálculo da largura)
           para não encostar neles. */
        padding: clamp(10px, 3vw, 24px);
      }

      .container {
        /* Perspectiva mais curta = profundidade 3D mais acentuada */
        perspective: 1600px;
        perspective-origin: center;
        /*
          Largura = o MENOR entre: 92% da largura, teto de 600px, e a altura
          disponível ÷ proporção do cartão (1.414). Como a altura entra na
          conta, o convite cabe inteiro em qualquer tela/orientação sem rolagem
          — sem depender de breakpoints. (linha vh = fallback; dvh sobrepõe)
        */
        width: min(
          92vw,
          600px,
          calc((100vh - var(--reserved-bottom, 120px)) / 1.414)
        );
        width: min(
          92vw,
          600px,
          calc((100dvh - var(--reserved-bottom, 120px)) / 1.414)
        );
      }

      .scene {
        position: relative;
        width: 100%;
        /* Proporção A-series (√2) do convite — substitui o hack padding-bottom
           e permite que a altura real limite o cartão. */
        aspect-ratio: 1 / 1.414;
        transform-style: preserve-3d;
        /* Elevação (lift) da cena durante o flip é animada aqui */
        will-change: transform;
      }

      /* Camada de parallax controlada pelo ponteiro (não conflita com o flip) */
      .card-tilt {
        position: absolute;
        inset: 0;
        transform-style: preserve-3d;
        transform: rotateX(var(--tilt-x, 0deg)) rotateY(var(--tilt-y, 0deg));
        transition: transform 0.4s ease-out;
      }

      .card-3d {
        position: absolute;
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        transition: transform 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        transform-origin: center center;
        will-change: transform;
      }

      .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: clamp(8px, 2.5vw, 16px);
        box-shadow: 0 clamp(4px, 1.5vw, 10px) clamp(16px, 6vw, 40px)
          rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      /* <picture> não deve interferir no layout: o <img> preenche a face */
      .card-face picture {
        display: contents;
      }

      .card-face img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* Brilho (glare) que segue o ponteiro sobre a face visível */
      .card-face::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at var(--glare-x, 50%) var(--glare-y, 50%),
          rgba(255, 255, 255, 0.35),
          rgba(255, 255, 255, 0) 45%
        );
        opacity: var(--glare-opacity, 0);
        transition: opacity 0.3s ease-out;
        pointer-events: none;
      }

      /* Sombra projetada no "chão" — reforça o volume durante o flip */
      .card-shadow {
        position: absolute;
        left: 10%;
        bottom: -5%;
        width: 80%;
        height: 8%;
        background: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0.35),
          rgba(0, 0, 0, 0) 70%
        );
        filter: blur(10px);
        transform: translateZ(-40px);
        z-index: -1;
        will-change: transform, opacity;
      }

      .envelope-face {
        z-index: 3;
      }

      /* Depois de abrir (1→2) o envelope é ocultado de vez: nunca voltamos ao
         estado 1, então ele não deve reaparecer no loop verso↔frente (era o que
         causava o "flash" do envelope antes da frente ao voltar do verso). */
      .opened .envelope-face {
        visibility: hidden;
      }

      /* --- Envelope premium (apenas no estado 1) --- */

      /* Realce sobre o lacre de cera real da imagem (~centro, 44% da altura):
         halo dourado + anel pulsante que sinaliza "toque para abrir". */
      .seal-glow {
        position: absolute;
        left: 50%;
        top: 44%;
        width: 34%;
        aspect-ratio: 1;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        pointer-events: none;
        z-index: 2;
      }

      .seal-glow::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(233, 201, 110, 0.5),
          rgba(233, 201, 110, 0) 65%
        );
        opacity: 0.25;
      }

      .seal-glow::after {
        content: "";
        position: absolute;
        inset: 18%;
        border-radius: 50%;
        border: 2px solid rgba(212, 165, 116, 0.85);
      }

      .state-1 .seal-glow::before {
        animation: sealGlow 4.5s ease-in-out infinite;
      }

      .state-1 .seal-glow::after {
        animation: sealRing 2.4s ease-out infinite;
      }

      /* Envelope flutua de leve e a sombra "respira" — convida ao toque */
      .state-1 .scene {
        animation: envFloat 4.5s ease-in-out infinite;
      }

      .state-1 .card-shadow {
        animation: envShadow 4.5s ease-in-out infinite;
      }

      @keyframes envFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-1.6%);
        }
      }

      @keyframes envShadow {
        0%,
        100% {
          transform: translateZ(-40px) scale(1);
          opacity: 1;
        }
        50% {
          transform: translateZ(-40px) scale(0.9);
          opacity: 0.7;
        }
      }

      @keyframes sealGlow {
        0%,
        100% {
          opacity: 0.25;
        }
        50% {
          opacity: 0.7;
        }
      }

      @keyframes sealRing {
        0% {
          transform: scale(0.8);
          opacity: 0.8;
        }
        100% {
          transform: scale(1.6);
          opacity: 0;
        }
      }

      .front-face {
        transform: rotateY(180deg);
      }

      .back-face {
        transform: rotateY(0deg);
      }

      /*
        Mapeamento de faces (base): envelope e verso ficam a 0deg, frente a 180deg.
        O envelope (z-index 3) cobre o verso no estado 1. Ao girar, o
        backface-visibility esconde as costas de cada face — então o envelope
        "vira" naturalmente em vez de sumir de repente.
      */

      /* Estado 1: envelope à mostra */
      .state-1 .card-3d {
        transform: rotateY(0deg);
      }

      /* Estado 2: frente do convite (flip 180°) */
      .state-2 .card-3d {
        transform: rotateY(180deg);
      }

      /* Estado 3: verso do convite (flip 360°) */
      .state-3 .card-3d {
        transform: rotateY(360deg);
      }

      /*
        No estado 3 a carta volta a 0deg: envelope e verso encaram o usuário ao
        mesmo tempo. Elevamos o verso acima do envelope para que 2.png vença,
        sem precisar de display:none (que causava o "pop" ao clicar).
      */
      .state-3 .back-face {
        z-index: 4;
      }

      /* Elevação da cena em direção ao usuário durante cada flip */
      .is-flipping .scene {
        animation: liftFlip 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95);
      }

      .is-flipping .card-shadow {
        animation: shadowFlip 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95);
      }

      @keyframes liftFlip {
        0%,
        100% {
          transform: translateZ(0) scale(1);
        }
        50% {
          transform: translateZ(90px) scale(1.04);
        }
      }

      @keyframes shadowFlip {
        0%,
        100% {
          transform: translateZ(-40px) scale(1);
          opacity: 1;
        }
        50% {
          transform: translateZ(-40px) scale(1.2);
          opacity: 0.55;
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .container {
        animation: fadeIn 1s ease-out;
      }

      .website-button {
        position: fixed;
        bottom: clamp(10px, 3dvh, 24px);
        left: 50%;
        transform: translateX(-50%);
        /* Dourado do convite; texto verde-escuro (contraste + identidade) */
        background: linear-gradient(135deg, #e6c65e 0%, #c9a24a 55%, #b8801f 100%);
        color: #2e3a12;
        padding: clamp(12px, 2.4vw, 16px) clamp(28px, 7vw, 46px);
        border-radius: 999px;
        font-size: clamp(13px, 3.6vw, 16px);
        font-weight: bold;
        letter-spacing: 0.5px;
        text-decoration: none;
        box-shadow: 0 6px 20px rgba(120, 90, 20, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.5);
        transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
        z-index: 1001;
        display: none;
        cursor: pointer;
        border: none;
        font-family: Georgia, "Times New Roman", serif;
        white-space: nowrap;
        max-width: 90vw;
        overflow: hidden;
      }

      /* Brilho que varre o botão ao passar o mouse */
      .website-button::before {
        content: "";
        position: absolute;
        top: 0;
        left: -60%;
        width: 40%;
        height: 100%;
        background: linear-gradient(
          100deg,
          transparent,
          rgba(255, 255, 255, 0.55),
          transparent
        );
        transform: skewX(-20deg);
        transition: left 0.6s ease;
        pointer-events: none;
      }

      .website-button:hover::before {
        left: 120%;
      }

      .btn-arrow {
        display: inline-block;
        margin-left: 0.5em;
        transition: transform 0.25s ease;
      }

      .website-button:hover {
        transform: translateX(-50%) translateY(-2px) scale(1.04);
        box-shadow: 0 10px 28px rgba(120, 90, 20, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.6);
        filter: brightness(1.05);
      }

      .website-button:hover .btn-arrow {
        transform: translateX(4px);
      }

      .website-button:active {
        transform: translateX(-50%) translateY(0) scale(0.99);
      }

      .website-button:focus-visible {
        outline: 3px solid rgba(45, 58, 20, 0.6);
        outline-offset: 3px;
      }

      .state-3 .website-button {
        display: block;
        animation: fadeIn 0.5s ease-out;
      }

      /*
        Layout fluido: clamp() em fontes/espaçamentos + largura ciente da altura
        (via min()/calc na .container) dispensam os breakpoints de largura. Só
        resta um ajuste para paisagem baixa (ex.: celular deitado), onde sobra
        pouca altura — encolhe o espaço reservado para o cartão crescer.
      */
      @media (max-height: 520px) and (orientation: landscape) {
        body {
          --reserved-bottom: clamp(56px, 20vh, 88px);
          --reserved-bottom: clamp(56px, 20dvh, 88px);
        }
      }

      /* Acessibilidade: reduz/desliga o movimento quando solicitado */
      @media (prefers-reduced-motion: reduce) {
        .card-3d {
          transition-duration: 0.01ms;
        }
        .card-tilt {
          transition: none;
          transform: none;
        }
        .is-flipping .scene,
        .is-flipping .card-shadow,
        .state-1 .scene,
        .state-1 .card-shadow,
        .state-1 .seal-glow::before,
        .state-1 .seal-glow::after {
          animation: none;
        }
        .card-face::after {
          display: none;
        }
      }
    </style>
  </head>
  <body class="state-1">
    <div class="container">
      <div class="scene">
        <div class="card-tilt">
          <div class="card-3d">
            <div class="card-face envelope-face">
              <picture>
                <source srcset="public/3.avif" type="image/avif" />
                <source srcset="public/3.webp" type="image/webp" />
                <img
                  src="public/3.png"
                  alt="Envelope do Convite"
                  width="1240"
                  height="1748"
                  fetchpriority="high"
                  decoding="async"
                />
              </picture>
              <!-- Realce animado sobre o lacre de cera -->
              <div class="seal-glow"></div>
            </div>
            <div class="card-face front-face">
              <picture>
                <!-- WebP como principal; PNG só de fallback p/ navegadores antigos -->
                <source srcset="public/1.webp" type="image/webp" />
                <img
                  src="public/1.png"
                  alt="Frente do Convite"
                  width="1240"
                  height="1748"
                  decoding="async"
                />
              </picture>
            </div>
            <div class="card-face back-face">
              <picture>
                <!-- WebP como principal; PNG só de fallback p/ navegadores antigos -->
                <source srcset="public/2.webp" type="image/webp" />
                <img
                  src="public/2.png"
                  alt="Verso do Convite"
                  width="1240"
                  height="1748"
                  fetchpriority="low"
                  decoding="async"
                />
              </picture>
            </div>
          </div>
        </div>
        <div class="card-shadow"></div>
      </div>
    </div>

    <button class="website-button" id="websiteButton">
      Acessar Site<span class="btn-arrow" aria-hidden="true">→</span>
    </button>

    <script>
      let currentState = 1;
      const body = document.body;
      const scene = document.querySelector(".scene");
      const websiteButton = document.getElementById("websiteButton");

      const prefersReducedMotion = window.matchMedia(
        "(prefers-reduced-motion: reduce)"
      ).matches;
      const supportsHover = window.matchMedia(
        "(hover: hover) and (pointer: fine)"
      ).matches;

      const card = document.querySelector(".card-3d");

      function render() {
        // Troca só a classe de estado, preservando classes persistentes
        // (is-flipping, opened) que o antigo `className =` apagava.
        body.classList.remove("state-1", "state-2", "state-3");
        body.classList.add(`state-${currentState}`);
      }

      // Ao terminar o primeiro flip (1→2), esconde o envelope de vez para que
      // ele não reapareça no ciclo verso↔frente.
      card.addEventListener("transitionend", (e) => {
        if (e.propertyName === "transform" && currentState !== 1) {
          body.classList.add("opened");
        }
      });

      // Reinicia a animação de elevação a cada flip (truque de reflow)
      function triggerFlip() {
        if (prefersReducedMotion) return;
        body.classList.remove("is-flipping");
        void body.offsetWidth;
        body.classList.add("is-flipping");
      }

      body.addEventListener("animationend", (e) => {
        if (e.animationName === "liftFlip") {
          body.classList.remove("is-flipping");
        }
      });

      body.addEventListener("click", (e) => {
        if (e.target.closest(".website-button")) {
          return;
        }

        if (currentState === 1) {
          currentState = 2;
        } else if (currentState === 2) {
          currentState = 3;
        } else {
          currentState = 2;
        }

        triggerFlip();
        render();
      });

      websiteButton.addEventListener("click", (e) => {
        e.stopPropagation();
        window.open("https://lucaseeduarda.com", "_blank");
      });

      // Parallax + brilho seguindo o ponteiro (apenas em dispositivos com mouse)
      if (supportsHover && !prefersReducedMotion) {
        const MAX_TILT = 7; // graus

        window.addEventListener("pointermove", (e) => {
          const rect = scene.getBoundingClientRect();
          const px = (e.clientX - rect.left) / rect.width; // 0..1
          const py = (e.clientY - rect.top) / rect.height; // 0..1
          const nx = Math.max(-1, Math.min(1, px * 2 - 1));
          const ny = Math.max(-1, Math.min(1, py * 2 - 1));

          scene.style.setProperty("--tilt-y", `${nx * MAX_TILT}deg`);
          scene.style.setProperty("--tilt-x", `${-ny * MAX_TILT}deg`);
          scene.style.setProperty("--glare-x", `${px * 100}%`);
          scene.style.setProperty("--glare-y", `${py * 100}%`);
          scene.style.setProperty("--glare-opacity", "1");
        });

        window.addEventListener("pointerleave", () => {
          scene.style.setProperty("--tilt-x", "0deg");
          scene.style.setProperty("--tilt-y", "0deg");
          scene.style.setProperty("--glare-opacity", "0");
        });
      }

      render();
    </script>
  </body>
</html>
